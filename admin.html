<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinepolis Admin Console — Ad Management</title>
  <meta name="description" content="Manage advertising campaigns and creatives for the self-service kiosk.">
  <link rel="stylesheet" href="css/design-system.css?v=1.2">
  <link rel="stylesheet" href="css/kiosk.css?v=1.2">
  <style>
    body {
      background: linear-gradient(135deg, var(--bg-dark), var(--bg-deep));
      min-height: 100vh;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      padding: 40px 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .admin-container {
      width: 100%;
      max-width: 850px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-star {
      color: var(--accent);
      font-size: 26px;
      animation: spin 10s linear infinite;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .logo-text span {
      color: var(--accent);
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }

    @media (min-width: 768px) {
      .admin-grid {
        grid-template-columns: 1fr 1.1fr;
      }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .form-group label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-input {
      background: rgba(255, 255, 255, 0.04);
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 10px rgba(245, 166, 35, 0.15);
    }

    /* Live Preview & Card Design matching the Attract screen */
    .ad-preview-box {
      border-radius: var(--radius-lg);
      padding: 24px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-deep);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      transition: all 0.4s ease;
    }

    .ad-preview-title {
      font-family: 'Outfit', sans-serif;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .ad-preview-sub {
      font-size: 14px;
      opacity: 0.85;
      font-weight: 500;
    }

    /* Preset color swatches */
    .color-swatches {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.2);
      transition: all 0.2s;
    }

    .swatch:hover, .swatch.selected {
      transform: scale(1.15);
      border-color: #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.4);
    }

    .ad-list-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .ad-list-card {
      position: relative;
      border-radius: var(--radius-md);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .ad-card-info {
      text-align: left;
    }

    .ad-card-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .ad-card-sub {
      font-size: 12px;
      opacity: 0.75;
    }

    .delete-btn {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #EF4444;
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .delete-btn:hover {
      background: #EF4444;
      color: white;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(0, 212, 170, 0.9);
      border: 1px solid var(--success);
      color: #fff;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      box-shadow: var(--shadow-deep);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s ease;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>
  <div class="admin-container">
    
    <!-- HEADER -->
    <header class="admin-header">
      <div class="logo-container">
        <div class="logo-star">✦</div>
        <div class="logo-text">Cine<span>polis</span></div>
      </div>
      <div style="display:flex; gap:12px; align-items:center;">
        <button class="btn btn-ghost btn-sm" onclick="resetToDefaults()">🔄 Reset Defaults</button>
        <a href="index.html" target="_blank" class="btn btn-primary btn-sm">👁️ Preview Kiosk</a>
      </div>
    </header>

    <div>
      <h1 class="screen-title" style="font-size: 28px; margin-bottom: 6px;">Kiosk Ad Management</h1>
      <p class="screen-subtitle" style="font-size: 13px;">Upload, customize, and arrange campaign banner creatives running on the self-service attract loops.</p>
    </div>

    <!-- MAIN INTERFACE GRID -->
    <div class="admin-grid">
      
      <!-- FORM COLUMN -->
      <section class="glass" style="border-radius: var(--radius-xl); padding: 24px;">
        <h2 style="font-family:'Outfit',sans-serif; font-size:18px; font-weight:800; margin-bottom:20px; border-bottom:1px solid var(--border-color); padding-bottom:8px;">➕ Create Banner</h2>
        
        <div class="form-group">
          <label for="ad-title">Headline Text</label>
          <input type="text" id="ad-title" class="form-input" placeholder="e.g. IMAX Experience" oninput="updatePreview()" value="Flat 20% Off on Food!">
        </div>

        <div class="form-group">
          <label for="ad-sub">Subtext / Details</label>
          <input type="text" id="ad-sub" class="form-input" placeholder="e.g. Feel every frame like never before" oninput="updatePreview()" value="Use code CRISPY🍿 on checkout">
        </div>

        <div class="form-group">
          <label>Theme Style Presets</label>
          <div class="color-swatches" id="theme-presets">
            <!-- Rendered by JS -->
          </div>
        </div>

        <button class="btn btn-primary btn-xl" style="width:100%; margin-top:12px;" onclick="addAd()">✨ Add & Publish Creative</button>
      </section>

      <!-- PREVIEW & LIST COLUMN -->
      <div style="display:flex; flex-direction:column; gap:20px;">
        
        <!-- Live Preview -->
        <div>
          <div style="font-size:11px; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Live Creative Preview</div>
          <div class="ad-preview-box" id="ad-preview">
            <div class="ad-preview-title" id="preview-title">Headline</div>
            <div class="ad-preview-sub" id="preview-sub">Subtitle details go here</div>
          </div>
        </div>

        <!-- Active Ads List -->
        <div>
          <div style="font-size:11px; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Active Ad Queue</div>
          <div class="ad-list-grid" id="ad-list">
            <!-- Rendered dynamically -->
          </div>
        </div>

      </div>

    </div>

  </div>

  <!-- TOAST NOTIFICATION -->
  <div class="toast" id="toast">Creative changes saved & published!</div>

  <script>
    const PRESETS = [
      { name: 'Amber Glow', color: '#F5A623', accent: '#1E0A3C' },
      { name: 'IMAX Teal', color: '#00D4AA', accent: '#0D0D1A' },
      { name: 'Romance Pink', color: '#E91E8C', accent: '#1A0A2E' },
      { name: 'Violet Star', color: '#7C3AED', accent: '#0D0D1A' },
      { name: 'Crimson Red', color: '#EF4444', accent: '#2A0808' }
    ];

    let selectedPreset = PRESETS[0];
    let ads = [];

    // Initialize Page
    function init() {
      // Load Presets Pickers
      const presetContainer = document.getElementById('theme-presets');
      presetContainer.innerHTML = PRESETS.map((p, idx) => `
        <div class="swatch ${idx === 0 ? 'selected' : ''}" 
             style="background: ${p.color}; border-color: ${p.accent};" 
             onclick="selectPreset(${idx}, this)" 
             title="${p.name}">
        </div>
      `).join('');

      loadAds();
      updatePreview();
    }

    function selectPreset(idx, el) {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      selectedPreset = PRESETS[idx];
      updatePreview();
    }

    function updatePreview() {
      const title = document.getElementById('ad-title').value || 'Headline';
      const sub = document.getElementById('ad-sub').value || 'Subtitle details go here';

      const previewBox = document.getElementById('ad-preview');
      const previewTitle = document.getElementById('preview-title');
      const previewSub = document.getElementById('preview-sub');

      previewBox.style.backgroundColor = selectedPreset.accent;
      previewBox.style.color = selectedPreset.color;
      previewBox.style.borderColor = selectedPreset.color;

      previewTitle.textContent = title;
      previewSub.textContent = sub;
    }

    function loadAds() {
      const stored = localStorage.getItem('cira_ads');
      if (stored) {
        ads = JSON.parse(stored);
      } else {
        ads = [
          { id: "ad001", title: "Book Early, Save More!", subtitle: "Up to 20% off on advance bookings", color: "#F5A623", accent: "#1E0A3C" },
          { id: "ad002", title: "IMAX Experience", subtitle: "Feel every frame like never before", color: "#00D4AA", accent: "#0D0D1A" },
          { id: "ad003", title: "Weekend Couple Pass", subtitle: "2 tickets + combo @ ₹999 only", color: "#E91E8C", accent: "#1A0A2E" },
          { id: "ad004", title: "Cinepolis Star Club", subtitle: "Join & earn points on every booking", color: "#7C3AED", accent: "#0D0D1A" }
        ];
        localStorage.setItem('cira_ads', JSON.stringify(ads));
      }
      renderAdList();
    }

    function renderAdList() {
      const listContainer = document.getElementById('ad-list');
      if (ads.length === 0) {
        listContainer.innerHTML = `
          <div class="glass" style="border-radius:var(--radius-md); padding:20px; text-align:center; color:var(--text-muted); font-size:13px;">
            No ads active. Add a creative to publish banners to the kiosk.
          </div>
        `;
        return;
      }

      listContainer.innerHTML = ads.map(ad => `
        <div class="ad-list-card glass" style="border-left: 4px solid ${ad.color};">
          <div class="ad-card-info">
            <div class="ad-card-title" style="color: ${ad.color}">${ad.title}</div>
            <div class="ad-card-sub">${ad.subtitle}</div>
          </div>
          <button class="delete-btn" onclick="deleteAd('${ad.id}')">🗑 Remove</button>
        </div>
      `).join('');
    }

    function addAd() {
      const title = document.getElementById('ad-title').value.trim();
      const sub = document.getElementById('ad-sub').value.trim();

      if (!title || !sub) {
        alert("Please fill in both the Headline and Subtext fields.");
        return;
      }

      const newAd = {
        id: 'ad_' + Date.now(),
        title: title,
        subtitle: sub,
        color: selectedPreset.color,
        accent: selectedPreset.accent
      };

      ads.push(newAd);
      localStorage.setItem('cira_ads', JSON.stringify(ads));
      renderAdList();
      
      // Reset inputs
      document.getElementById('ad-title').value = '';
      document.getElementById('ad-sub').value = '';
      updatePreview();
      
      showToast("Creative Published & Synced!");
    }

    function deleteAd(id) {
      ads = ads.filter(ad => ad.id !== id);
      localStorage.setItem('cira_ads', JSON.stringify(ads));
      renderAdList();
      showToast("Creative removed successfully");
    }

    function resetToDefaults() {
      localStorage.removeItem('cira_ads');
      loadAds();
      showToast("Reset to standard mock ads");
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => {
        t.classList.remove('show');
      }, 3000);
    }

    // Run Initialization
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
